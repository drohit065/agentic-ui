<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NVIDIA AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      background: #111118;
      border-bottom: 1px solid #1e1e30;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, #76b900, #00c853);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #000;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      background: linear-gradient(135deg, #76b900, #00e676);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .api-bar {
      padding: 10px 24px;
      background: #0d0d18;
      border-bottom: 1px solid #1e1e30;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .api-bar label { font-size: 0.8rem; color: #666; white-space: nowrap; }

    .api-bar input[type="password"],
    .api-bar input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid #1e1e30;
      background: #111118;
      color: #e0e0e0;
      font-size: 0.84rem;
    }

    .api-bar input:focus { outline: none; border-color: #76b900; }

    .api-bar select {
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid #1e1e30;
      background: #111118;
      color: #e0e0e0;
      font-size: 0.84rem;
      cursor: pointer;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      opacity: 0.35;
      pointer-events: none;
    }

    .empty-state .big { font-size: 52px; }
    .empty-state p { font-size: 0.95rem; }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      font-weight: bold;
    }

    .message.user .avatar     { background: #1a4a6e; color: #4fc3f7; }
    .message.assistant .avatar { background: linear-gradient(135deg, #76b900, #00c853); color: #000; font-size: 13px; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.93rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 680px;
    }

    .message.user .bubble {
      background: #0e2e4a;
      border: 1px solid #1a4a6e;
      border-top-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #111118;
      border: 1px solid #1e1e30;
      border-top-left-radius: 4px;
    }

    .img-in-bubble {
      max-width: 240px;
      max-height: 180px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #1e1e30;
      display: block;
      margin-bottom: 8px;
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: #76b900;
      border-radius: 2px;
      vertical-align: middle;
      animation: blink 0.65s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .input-area {
      padding: 14px 24px 18px;
      background: #0d0d18;
      border-top: 1px solid #1e1e30;
    }

    .img-attach-bar {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 7px 12px;
      background: #111118;
      border: 1px solid #1e1e30;
      border-radius: 10px;
    }

    .img-attach-bar img { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; }
    .img-attach-bar span { font-size: 0.8rem; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .rm-img {
      background: none;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .rm-img:hover { background: #2a1212; }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    #user-input {
      flex: 1;
      padding: 11px 15px;
      border-radius: 12px;
      border: 1px solid #1e1e30;
      background: #111118;
      color: #e0e0e0;
      font-size: 0.93rem;
      resize: none;
      min-height: 46px;
      max-height: 140px;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    #user-input:focus { outline: none; border-color: #76b900; }

    .btn {
      padding: 11px 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.94); }

    #attach-btn {
      background: #111118;
      color: #888;
      border: 1px solid #1e1e30;
    }
    #attach-btn:hover { background: #1e1e30; color: #ddd; }

    #send-btn {
      background: linear-gradient(135deg, #76b900, #00c853);
      color: #000;
      font-weight: bold;
      min-width: 46px;
    }
    #send-btn:hover { opacity: 0.88; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-btn {
      background: none;
      border: 1px solid #1e1e30;
      color: #f87171;
      font-size: 0.8rem;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    #clear-btn:hover { background: #1a0a0a; }

    .hint { font-size: 0.72rem; color: #444; margin-top: 8px; text-align: center; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e1e30; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo">N</div>
  <h1>NVIDIA AI Chat</h1>
  <div style="flex:1"></div>
  <button id="clear-btn">🗑 Clear</button>
</header>

<div class="api-bar">
  <label id="key-label" style="display:none">API Key:</label>
  <input type="password" id="api-key" placeholder="nvapi-..." style="display:none" />

  <label>Model:</label>
  <select id="model-select">
    <optgroup label="Text Models">
      <option value="google/gemma-2-2b-it">google/gemma-2-2b-it</option>
      <option value="meta/llama-3.1-8b-instruct">meta/llama-3.1-8b-instruct</option>
      <option value="meta/llama-3.1-70b-instruct">meta/llama-3.1-70b-instruct</option>
      <option value="mistralai/mistral-7b-instruct-v0.3">mistralai/mistral-7b-instruct-v0.3</option>
      <option value="microsoft/phi-3-mini-128k-instruct">microsoft/phi-3-mini-128k-instruct</option>
    </optgroup>
    <optgroup label="Vision Models (Image Support)">
      <option value="meta/llama-3.2-11b-vision-instruct">meta/llama-3.2-11b-vision-instruct</option>
      <option value="meta/llama-3.2-90b-vision-instruct">meta/llama-3.2-90b-vision-instruct</option>
      <option value="microsoft/phi-3-vision-128k-instruct">microsoft/phi-3-vision-128k-instruct</option>
      <option value="adept/fuyu-8b">adept/fuyu-8b</option>
    </optgroup>
  </select>
</div>

<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <div class="big">🤖</div>
    <p>Chat with NVIDIA AI — text or image</p>
  </div>
</div>

<div class="input-area">
  <div class="img-attach-bar" id="img-bar">
    <img id="thumb" src="" alt="" />
    <span id="fname">image.jpg</span>
    <button class="rm-img" id="rm-img">✕</button>
  </div>
  <div class="input-row">
    <button class="btn" id="attach-btn" title="Attach image (use a vision model)">🖼</button>
    <textarea id="user-input" rows="1" placeholder="Type a message… Enter to send, Shift+Enter for new line"></textarea>
    <button class="btn" id="send-btn">➤</button>
  </div>
  <p class="hint">Requests go directly from your browser to NVIDIA's API. Keep your key private.</p>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none" />

<script>
  const NVIDIA_BASE = '';  // proxy: same origin

  const chatWin    = document.getElementById('chat-window');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const attachBtn  = document.getElementById('attach-btn');
  const fileInput  = document.getElementById('file-input');
  const clearBtn   = document.getElementById('clear-btn');
  const imgBar     = document.getElementById('img-bar');
  const thumb      = document.getElementById('thumb');
  const fname      = document.getElementById('fname');
  const rmImg      = document.getElementById('rm-img');
  const emptyState = document.getElementById('empty-state');
  const apiKeyEl   = document.getElementById('api-key');
  const modelSel   = document.getElementById('model-select');

  // API key is handled server-side (already hidden via inline style)

  const VISION_MODELS = ['meta/llama-3.2-11b-vision-instruct', 'meta/llama-3.2-90b-vision-instruct', 'microsoft/phi-3-vision-128k-instruct', 'adept/fuyu-8b'];

  let attached = null;  // { dataUrl, mimeType, name }
  let history  = [];    // [{ role, content }]

  // Auto-grow textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);
  attachBtn.addEventListener('click', () => fileInput.click());
  clearBtn.addEventListener('click', clearChat);
  rmImg.addEventListener('click', clearImage);

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    // Auto-switch to vision model if current model doesn't support images
    if (!VISION_MODELS.includes(modelSel.value)) {
      modelSel.value = 'meta/llama-3.2-11b-vision-instruct';
    }

    // Compress image to max 1024px and JPEG quality 0.8 before sending
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1024;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const compressed = canvas.toDataURL('image/jpeg', 0.8);
        attached = { dataUrl: compressed, mimeType: 'image/jpeg', name: file.name };
        thumb.src = compressed;
        fname.textContent = file.name;
        imgBar.style.display = 'flex';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  function clearImage() {
    attached = null;
    imgBar.style.display = 'none';
    thumb.src = '';
  }

  function clearChat() {
    history = [];
    chatWin.innerHTML = '';
    chatWin.appendChild(emptyState);
    emptyState.style.display = 'flex';
    clearImage();
  }

  function hideEmpty() { emptyState.style.display = 'none'; }

  function addUserMsg(text, imgDataUrl) {
    hideEmpty();
    const wrap   = document.createElement('div');
    wrap.className = 'message user';

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = '👤';

    const bub = document.createElement('div');
    bub.className = 'bubble';

    if (imgDataUrl) {
      const img = document.createElement('img');
      img.src = imgDataUrl;
      img.className = 'img-in-bubble';
      bub.appendChild(img);
    }

    if (text) {
      const t = document.createElement('span');
      t.textContent = text;
      bub.appendChild(t);
    }

    wrap.appendChild(av);
    wrap.appendChild(bub);
    chatWin.appendChild(wrap);
    chatWin.scrollTop = chatWin.scrollHeight;
  }

  function addAssistantBubble() {
    hideEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'message assistant';

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = 'AI';

    const bub = document.createElement('div');
    bub.className = 'bubble';

    const textSpan = document.createElement('span');
    const cur = document.createElement('span');
    cur.className = 'cursor';

    bub.appendChild(textSpan);
    bub.appendChild(cur);
    wrap.appendChild(av);
    wrap.appendChild(bub);
    chatWin.appendChild(wrap);
    chatWin.scrollTop = chatWin.scrollHeight;
    return { textSpan, cur };
  }

  async function send() {
    const apiKey = 'proxy'; // handled server-side

    const text = userInput.value.trim();
    if (!text && !attached) return;

    sendBtn.disabled = true;
    userInput.value  = '';
    userInput.style.height = 'auto';

    // Build content array (OpenAI format)
    const contentParts = [];

    if (attached) {
      contentParts.push({
        type: 'image_url',
        image_url: { url: attached.dataUrl }
      });
    }

    if (text) {
      contentParts.push({ type: 'text', text });
    }

    const userContent = contentParts.length === 1 && contentParts[0].type === 'text'
      ? text
      : contentParts;

    addUserMsg(text, attached?.dataUrl);
    history.push({ role: 'user', content: userContent });
    if (attached) clearImage();

    const { textSpan, cur } = addAssistantBubble();

    try {
      const response = await fetch(`${NVIDIA_BASE}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          model: modelSel.value,
          messages: history,
          temperature: 0.2,
          top_p: 0.7,
          max_tokens: 1024,
          stream: true,
        }),
      });

      if (!response.ok) {
        let msg = `API error ${response.status}`;
        try { const e = await response.json(); msg = e?.detail || e?.message || msg; } catch {}
        textSpan.textContent = '⚠ ' + msg;
        cur.remove();
        sendBtn.disabled = false;
        return;
      }

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer    = '';
      let fullText  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const json = line.slice(6).trim();
          if (json === '[DONE]') continue;
          try {
            const chunk = JSON.parse(json);
            const delta = chunk?.choices?.[0]?.delta?.content;
            if (delta) {
              fullText += delta;
              textSpan.textContent = fullText;
              chatWin.scrollTop = chatWin.scrollHeight;
            }
          } catch { /* skip malformed */ }
        }
      }

      cur.remove();
      history.push({ role: 'assistant', content: fullText });

    } catch (err) {
      textSpan.textContent = '⚠ Network error: ' + err.message;
      cur.remove();
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
